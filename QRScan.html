<body>
    
    <a href="adminHomePage.php" class="back">

    <h2>Scan Book QR Code</h2>
    
    <div id="reader"></div>

    <form id="QRScan" method="POST" action="issue.php">
        <input type="text" name="isbn" id="isbn" placeholder="Scanned ISBN" required>
        <input type="text" name="user_id" placeholder="Enter User ID" required>
        <button name="action" value="issue">Issue Book</button>
        <button name="action" value="return">Return Book</button>
        <button name="action" value="reissue">Reissue Book</button>
    </form>

    <script>
        const scanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 250 });

        function extractISBN(text) {
            // Extract a 10 or 13 digit ISBN from the scanned text
            const match = text.match(/\b(?:\d{9}[\dXx]|\d{13})\b/);
            return match ? match[0] : null;
        }

        scanner.render((decodedText) => {
            const isbn = extractISBN(decodedText);
            if (isbn) {
                document.getElementById("isbn").value = isbn;
                scanner.clear(); // Stop the scanner after successful read
            } else {
                alert("No valid ISBN found in QR code. Please try again.");
            }
        });
    </script>
</body>
